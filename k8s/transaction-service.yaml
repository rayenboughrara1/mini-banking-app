apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-service-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transaction-service
  template:
    metadata:
      labels:
        app: transaction-service
    spec:
      containers:
        - name: transaction-service
          image: 1bogh/transaction-service:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: transaction-service-service
spec:
  selector:
    app: transaction-service
  ports:
    - port: 8080
      targetPort: 8080