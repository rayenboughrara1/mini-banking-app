name: Build and Push Docker Images

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push AccountService
        uses: docker/build-push-action@v6
        with:
          context: ./account-service/AccountService
          push: true
          tags: 1bogh/account-service:latest

      - name: Build and push TransactionService
        uses: docker/build-push-action@v6
        with:
          context: ./transaction-service/TransactionService
          push: true
          tags: 1bogh/transaction-service:latest

      - name: Build and push NotificationService
        uses: docker/build-push-action@v6
        with:
          context: ./notification-service/NotificationService
          push: true
          tags: 1bogh/notification-service:latest

      - name: Build and push API Gateway
        uses: docker/build-push-action@v6
        with:
          context: ./gateway/ApiGateway
          push: true
          tags: 1bogh/api-gateway:latest